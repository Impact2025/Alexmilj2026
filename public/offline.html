<!DOCTYPE html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0f172a" />
    <title>Offline · IKIGAI Kompas</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        min-height: 100vh;
        background: #0f172a;
        color: #e2e8f0;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        display: flex; align-items: center; justify-content: center;
        padding: 24px; text-align: center;
      }
      .card {
        max-width: 420px; width: 100%;
        background: rgba(30, 41, 59, 0.5);
        border: 1px solid rgba(251, 191, 36, 0.2);
        border-radius: 24px; padding: 40px 28px;
        backdrop-filter: blur(12px);
      }
      .emoji { font-size: 64px; margin-bottom: 16px; }
      h1 { font-size: 22px; margin-bottom: 12px; background: linear-gradient(90deg,#f59e0b,#f97316); -webkit-background-clip: text; background-clip: text; color: transparent; font-weight: 800; }
      p { color: #94a3b8; line-height: 1.6; font-size: 15px; }
      .hint { margin-top: 24px; font-size: 13px; color: #64748b; }
      button {
        margin-top: 24px; padding: 12px 24px; border: none; border-radius: 12px;
        background: linear-gradient(90deg,#f59e0b,#f97316); color: white; font-weight: 700;
        cursor: pointer; font-size: 15px;
      }
      button:active { transform: scale(0.98); }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="emoji">🧭</div>
      <h1>Je bent offline</h1>
      <p>
        Geen verbinding — maar geen probleem! Je voortgang staat veilig op dit
        toestel. Zodra je weer wifi hebt, syncen we alles automatisch.
      </p>
      <p class="hint">
        Tip: zet de app op je startscherm (deel-icoontje → "Zet op beginscherm")
        zodat je 'm ook zonder internet met één tik opent.
      </p>
      <button onclick="location.reload()">Opnieuw proberen</button>
    </div>
  </body>
</html>
